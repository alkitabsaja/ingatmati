name: Fetch, Build, and Deploy

on:
  # Rebuild whenever you push changes to the repo (templates, styles, etc.)
  push:
    branches: [main]

  # Rebuild automatically on a schedule to pick up new WordPress content.
  # This example runs every 6 hours — adjust to taste.
  schedule:
    - cron: "0 */6 * * *"

  # Lets you trigger a rebuild manually from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch content from WordPress
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
        run: npm run fetch

      - name: Build static site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
